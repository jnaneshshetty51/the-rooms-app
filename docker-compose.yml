version: '3.8'

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: the_rooms_postgres
    environment:
      POSTGRES_DB: the_rooms
      POSTGRES_USER: ${POSTGRES_USER:-therooms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U therooms"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: the_rooms_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ───────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: the_rooms_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Console (admin UI)
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── MinIO Init (creates buckets + policies on startup) ─────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/rooms-photos --ignore-existing;
      mc mb myminio/guest-documents --ignore-existing;
      mc mb myminio/invoices --ignore-existing;
      mc mb myminio/receipts --ignore-existing;
      mc mb myminio/announcements --ignore-existing;
      mc anonymous set download myminio/rooms-photos;
      mc anonymous set download myminio/announcements;
      mc anonymous set private myminio/guest-documents;
      mc anonymous set private myminio/invoices;
      mc anonymous set private myminio/receipts;
      mc lifecycle set myminio/guest-documents expiry --days 90 '**' 2>/dev/null || true;
      echo 'MinIO buckets initialized successfully';
      exit 0;
      "
    restart: "no"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────
  # NOT started by default — the host machine runs nginx to serve existing sites.
  # Only bring this up if you are running a standalone Docker-only setup.
  # Start explicitly with: docker compose --profile standalone-nginx up -d
  nginx:
    profiles: ["standalone-nginx"]
    image: nginx:alpine
    container_name: the_rooms_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - postgres
      - minio
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
