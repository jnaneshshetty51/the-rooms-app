[databases]
the_rooms = host=127.0.0.1 port=5432 dbname=the_rooms

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — best for Next.js API routes (short-lived queries)
pool_mode = transaction

; 20 real connections to Postgres (well within max_connections=100)
default_pool_size = 20

; Allow up to 200 client connections (across all 5 apps)
max_client_conn = 200

; Queue clients when pool is full rather than reject
reserve_pool_size = 5
reserve_pool_timeout = 3

; Log settings
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Keep alive
server_idle_timeout = 600
client_idle_timeout = 0

; Stats
stats_period = 60
