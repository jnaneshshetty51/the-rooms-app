# The Rooms — Nginx Subdomain Routing
# Drop this file into /etc/nginx/conf.d/ on the VPS (host nginx, not Docker nginx).
# Existing sites in /etc/nginx/conf.d/ are untouched.
# Run: sudo nginx -t && sudo nginx -s reload

# Rate limiting zones — only define once across all configs.
# If you already have these zone names defined elsewhere, rename them here.
limit_req_zone $binary_remote_addr zone=rooms_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=rooms_web:10m rate=60r/m;

# ── therooms.in → web app (port 3000) ─────────────────────────────────────
server {
    listen 80;
    server_name therooms.in www.therooms.in;
    return 301 https://therooms.in$request_uri;
}

server {
    listen 443 ssl http2;
    server_name therooms.in www.therooms.in;

    ssl_certificate     /etc/letsencrypt/live/therooms.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/therooms.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        limit_req zone=rooms_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    location / {
        limit_req zone=rooms_web burst=50 nodelay;
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

# ── my.therooms.in → guest portal (port 3001) ───────────────────────────────
server {
    listen 80;
    server_name my.therooms.in;
    return 301 https://my.therooms.in$request_uri;
}

server {
    listen 443 ssl http2;
    server_name my.therooms.in;

    ssl_certificate     /etc/letsencrypt/live/my.therooms.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my.therooms.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

